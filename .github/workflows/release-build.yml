name: Release Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - armv7-unknown-linux-musleabihf

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build static binaries
        env:
          RUSTFLAGS: -C target-feature=+crt-static
        run: |
          cross build --release --locked --target "${{ matrix.target }}" --bin vegas --bin vegas-user

      - name: Package artifacts
        env:
          TAG: ${{ github.ref_name }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          PKG_DIR="vegas-${TAG}-${TARGET}"
          mkdir -p "$PKG_DIR"

          cp "target/${TARGET}/release/vegas" "$PKG_DIR/vegas"
          cp "target/${TARGET}/release/vegas-user" "$PKG_DIR/vegas-user"

          chmod +x "$PKG_DIR/vegas" "$PKG_DIR/vegas-user"
          tar -czf "${PKG_DIR}.tar.gz" "$PKG_DIR"

      - name: Upload artifact bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: vegas-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          if-no-files-found: error

  publish:
    name: Publish release assets
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz > SHA256SUMS.txt

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS.txt
